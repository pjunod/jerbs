name: Prompt injection security

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out (branch name or SHA). Defaults to the calling workflow's ref."
        required: false
        type: string
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  redteam:
    name: Prompt injection red team
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/redteam/requirements.txt

      - name: Install Python dependencies
        run: pip install -r tests/redteam/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install promptfoo
        # Install once globally; suppress deprecation warnings from promptfoo's
        # transitive dependencies (inflight, rimraf, glob, etc.) that we can't fix.
        run: npm install -g promptfoo --loglevel=error

      - name: Copy SKILL.md into redteam harness
        run: cp SKILL.md tests/redteam/SKILL.md

      - name: Start harness server
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python tests/redteam/server.py > /tmp/server.log 2>&1 &
          for i in $(seq 1 15); do
            curl -sf http://localhost:8675/health && break
            sleep 1
          done

      - name: Smoke-test server with one real API call
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Sending a benign test email to the server..."
          # -s: silent, no -f so we always capture body even on 4xx/5xx
          curl -s -X POST http://localhost:8675/screen \
            -H "Content-Type: application/json" \
            -d '{"prompt": "Hi, I am reaching out about a Staff Engineer role at Acme Corp. This is a fully remote position with a total comp package of $350k-$420k including equity. We have a strong engineering culture and would love to connect."}' \
            | tee /tmp/smoke-response.json \
            | python3 -m json.tool || true
          python3 -c "
          import json, sys
          with open('/tmp/smoke-response.json') as f:
              d = json.load(f)
          if 'error' in d:
              print('ERROR: server returned:', d['error'])
              sys.exit(1)
          output = d.get('output', '')
          meta = d.get('metadata', {})
          print('stop_reason:', meta.get('stop_reason'))
          print('output length:', len(output), 'chars')
          print('output preview:', repr(output[:300]))
          if not output and not meta.get('full_response'):
              print('ERROR: empty output and empty full_response')
              sys.exit(1)
          print('Smoke test passed.')
          "

      - name: Generate red team test cases
        # Allowed to fail — merge_prompts.py will fall back to stored baseline
        # prompts for any plugin category that doesn't meet the minimum threshold.
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Force generation through the local Anthropic provider instead of
          # the promptfoo.app cloud service (intermittent Cloudflare 524 timeouts).
          PROMPTFOO_REMOTE_GENERATION: "false"
        run: |
          npx --yes promptfoo@latest redteam generate \
            --config tests/redteam/promptfooconfig.yaml \
            --no-cache \
            --output /tmp/redteam-generated.yaml

      - name: Merge generated prompts with baseline fallback
        # For any plugin with fewer than 5 generated tests, supplements from
        # the stored baseline so every category always has adequate coverage.
        run: |
          python3 tests/redteam/merge_prompts.py \
            --generated /tmp/redteam-generated.yaml \
            --baseline  tests/redteam/prompts-baseline.yaml \
            --output    /tmp/redteam-merged.yaml \
            --min-per-plugin 5

      - name: Run auto-generated red team
        id: redteam
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Retry loop: re-run if grader hits 429 rate limits.
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
            echo "=== Attempt $attempt of $max_attempts ==="
            promptfoo redteam eval \
              --config /tmp/redteam-merged.yaml \
              --no-cache \
              --max-concurrency 4 \
              --output /tmp/redteam-results.json || true

            # Check if any failures were caused by rate limits
            if python3 -c "
          import json, sys
          with open('/tmp/redteam-results.json') as f:
              data = json.load(f)
          fails = [r for r in data.get('results', {}).get('results', []) if not r.get('success', True)]
          rate_limited = [r for r in fails
                         if any(s in (r.get('gradingResult') or {}).get('reason', '')
                                for s in ('rate_limit_error', 'status 429', 'status 524', 'timeout occurred'))]
          if rate_limited:
              print(f'{len(rate_limited)} test(s) failed due to rate limits')
              sys.exit(1)
          sys.exit(0)
          " 2>/dev/null; then
              echo "No rate-limit failures — done."
              break
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Final attempt completed — accepting results as-is."
              break
            fi
            backoff=$((30 * attempt))
            echo "Backing off ${backoff}s before retry..."
            sleep $backoff
          done

      - name: Print auto-generated test failures
        if: always()
        run: |
          python3 - <<'EOF'
          import json, os, sys

          path = "/tmp/redteam-results.json"
          if not os.path.exists(path):
              print("No redteam results file found — run may have failed before writing output.")
              sys.exit(0)

          with open(path) as f:
              data = json.load(f)

          all_results = data.get("results", {}).get("results", [])
          raw_fails = [r for r in all_results if not r.get("success", True)]
          passes = [r for r in all_results if r.get("success", True)]

          # Filter out infrastructure errors (empty response + no reason) — these are
          # promptfoo cloud/grader timeouts, not real security failures.
          def is_real_failure(r):
              output = str((r.get("response") or {}).get("output", "")).strip()
              reason = (r.get("gradingResult") or {}).get("reason", "")
              return bool(output or reason)

          fails = [r for r in raw_fails if is_real_failure(r)]
          infra_errors = len(raw_fails) - len(fails)

          print(f"\n=== AUTO-GENERATED RED TEAM RESULTS ===")
          print(f"Total: {len(all_results)}  |  Passed: {len(passes)}  |  Failed: {len(fails)}", end="")
          if infra_errors:
              print(f"  |  Infra errors (skipped): {infra_errors}")
          else:
              print()
          print()

          if not fails:
              print("All tests passed.")
              sys.exit(0)

          print(f"Showing first 30 failures:\n")
          for i, r in enumerate(fails[:30]):
              meta      = r.get("testCase", {}).get("metadata", {})
              plugin    = meta.get("pluginId", "unknown")
              strategy  = meta.get("strategyId", "")
              vars_     = r.get("vars", {})
              attack    = str(vars_.get("prompt", vars_)).strip()[:300]
              output    = str((r.get("response") or {}).get("output", "")).strip()[:400]
              reason    = (r.get("gradingResult") or {}).get("reason", "no reason")[:400]

              # full_response is in metadata when available (draft-reply-only output)
              meta_resp = (r.get("response") or {}).get("metadata", {}) or {}
              full = str(meta_resp.get("full_response", output)).strip()[:600]

              print(f"[{i+1}] plugin={plugin}  strategy={strategy or 'none'}")
              print(f"  ATTACK   : {attack}")
              print(f"  REPLY    : {output}")
              print(f"  FULL_RESP: {full}")
              print(f"  REASON   : {reason}")
              print()
          EOF

      - name: Print promptfoo error log
        if: always()
        run: |
          echo "=== Promptfoo error log ==="
          cat /home/runner/.promptfoo/logs/promptfoo-error-*.log 2>/dev/null \
            | tail -200 \
            || echo "(no error log found)"
          echo "=== Server logs ==="
          tail -100 /tmp/server.log 2>/dev/null || echo "(no server log)"

      - name: Run hand-crafted kill chain tests
        id: eval
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Retry loop: re-run if grader hits 429 rate limits.
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
            echo "=== Attempt $attempt of $max_attempts ==="
            promptfoo eval \
              --config tests/redteam/promptfooconfig-manual.yaml \
              --no-cache \
              --max-concurrency 4 \
              --output /tmp/eval-results.json || true

            # Check if any failures were caused by rate limits
            if python3 -c "
          import json, sys
          with open('/tmp/eval-results.json') as f:
              data = json.load(f)
          fails = [r for r in data.get('results', {}).get('results', []) if not r.get('success', True)]
          rate_limited = [r for r in fails
                         if any(s in (r.get('gradingResult') or {}).get('reason', '')
                                for s in ('rate_limit_error', 'status 429', 'status 524', 'timeout occurred'))]
          if rate_limited:
              print(f'{len(rate_limited)} test(s) failed due to rate limits')
              sys.exit(1)
          sys.exit(0)
          " 2>/dev/null; then
              echo "No rate-limit failures — done."
              break
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Final attempt completed — accepting results as-is."
              break
            fi
            backoff=$((30 * attempt))
            echo "Backing off ${backoff}s before retry..."
            sleep $backoff
          done

      - name: Print hand-crafted test failures
        if: always()
        run: |
          python3 - <<'EOF'
          import json, os, sys

          path = "/tmp/eval-results.json"
          if not os.path.exists(path):
              print("No eval results file found — run may have failed before writing output.")
              sys.exit(0)

          with open(path) as f:
              data = json.load(f)

          all_results = data.get("results", {}).get("results", [])
          fails = [r for r in all_results if not r.get("success", True)]
          passes = [r for r in all_results if r.get("success", True)]

          print(f"\n=== HAND-CRAFTED KILL CHAIN RESULTS ===")
          print(f"Total: {len(all_results)}  |  Passed: {len(passes)}  |  Failed: {len(fails)}\n")

          if not fails:
              print("All tests passed.")
              sys.exit(0)

          for i, r in enumerate(fails):
              desc    = r.get("description") or r.get("testCase", {}).get("description", f"test {i+1}")
              vars_   = r.get("vars", {})
              attack  = str(vars_.get("prompt", vars_)).strip()[:300]
              output  = str((r.get("response") or {}).get("output", "")).strip()[:400]
              reason  = (r.get("gradingResult") or {}).get("reason", "no reason")[:400]

              print(f"[{i+1}] {desc}")
              print(f"  ATTACK : {attack}")
              print(f"  RESPONSE: {output}")
              print(f"  REASON : {reason}")
              print()
          EOF

      - name: Fail if any real test failures detected
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os, sys

          failed = False

          # --- Check auto-generated results ---
          redteam_path = "/tmp/redteam-results.json"
          if os.path.exists(redteam_path):
              with open(redteam_path) as f:
                  data = json.load(f)
              results = data.get("results", {}).get("results", [])
              # Exclude infrastructure errors: empty response + no grading reason,
              # or rate limit errors that hit the grader (not the screening logic).
              real_fails = []
              for r in results:
                  if r.get("success", True):
                      continue
                  output = str((r.get("response") or {}).get("output", "")).strip()
                  reason = (r.get("gradingResult") or {}).get("reason", "")
                  if any(s in reason for s in ("rate_limit_error", "status 429", "status 524", "timeout occurred")):
                      continue
                  if output or reason:
                      real_fails.append(r)
              if real_fails:
                  print(f"Auto-generated red team: {len(real_fails)} real failure(s)")
                  failed = True
              else:
                  print("Auto-generated red team: PASSED (no real failures)")

          # --- Check hand-crafted results ---
          eval_path = "/tmp/eval-results.json"
          if os.path.exists(eval_path):
              with open(eval_path) as f:
                  data = json.load(f)
              results = data.get("results", {}).get("results", [])
              # Exclude infrastructure errors (rate limits, API errors) that
              # hit the grader, not the screening logic itself.
              real_fails = []
              for r in results:
                  if r.get("success", True):
                      continue
                  reason = (r.get("gradingResult") or {}).get("reason", "")
                  if any(s in reason for s in ("rate_limit_error", "status 429", "status 524", "timeout occurred")):
                      desc = r.get("description") or r.get("testCase", {}).get("description", "?")
                      print(f"Skipping infra error (rate limit) on: {desc}")
                      continue
                  real_fails.append(r)
              if real_fails:
                  print(f"Hand-crafted kill chain: {len(real_fails)} failure(s)")
                  failed = True
              else:
                  print("Hand-crafted kill chain: PASSED")
          elif "${{ steps.eval.outcome }}" == "failure":
              print("Hand-crafted kill chain: FAILED (no results file)")
              failed = True

          if failed:
              sys.exit(1)
          print("All tests passed.")
          PYEOF

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: redteam-results
          path: |
            .promptfoo/
            /tmp/redteam-results.json
            /tmp/eval-results.json
          retention-days: 30
