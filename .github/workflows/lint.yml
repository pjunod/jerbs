name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install ruff yamllint

      - name: ruff check (PEP 8 / pyflakes / isort / bugbear)
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: yamllint
        run: yamllint .

      - name: Check scheduler.html symlink resolves
        run: test -f claude-web/assets/scheduler.html
