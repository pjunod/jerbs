name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install ruff yamllint

      - name: ruff check (PEP 8 / pyflakes / isort / bugbear)
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: yamllint
        run: yamllint .

  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/unit/requirements.txt

      - name: Install dependencies
        run: pip install -r tests/unit/requirements.txt

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ -v --tb=short \
            --cov=claude-code --cov=shared/scripts \
            --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false
