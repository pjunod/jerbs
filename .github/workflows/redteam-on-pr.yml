name: Red team (PR on demand)

# Comment /redteam on any PR to kick off the prompt injection security suite
# against that branch. A 🚀 reaction confirms the trigger was received.
# Results are posted as a commit status on the PR head so they appear in the
# PR's checks section.

on:
  issue_comment:
    types: [created]

jobs:
  # ---------------------------------------------------------------------------
  # Validate the command and gather PR metadata
  # ---------------------------------------------------------------------------
  setup:
    name: Validate /redteam command
    # Only fire on PR comments (not plain issue comments) with /redteam
    if: github.event.issue.pull_request && startsWith(github.event.comment.body, '/redteam')
    runs-on: ubuntu-latest
    permissions:
      issues: write  # post the confirmation comment
      pull-requests: write  # read PR metadata
      statuses: write  # set commit status on the PR head

    outputs:
      branch: ${{ steps.pr.outputs.branch }}
      sha: ${{ steps.pr.outputs.sha }}

    steps:
      - name: React to confirm receipt
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Get PR branch and SHA
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('branch', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);

      - name: Set pending commit status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.sha }}',
              state: 'pending',
              context: 'Red team / Prompt injection security',
              description: 'Running prompt injection security tests...',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

  # ---------------------------------------------------------------------------
  # Run the full red team suite against the PR branch
  # ---------------------------------------------------------------------------
  redteam:
    name: Prompt injection security
    needs: setup
    uses: ./.github/workflows/redteam.yml
    with:
      ref: ${{ needs.setup.outputs.branch }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ---------------------------------------------------------------------------
  # Report final status back to the PR
  # ---------------------------------------------------------------------------
  report:
    name: Report status to PR
    needs: [setup, redteam]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      statuses: write

    steps:
      - name: Set final commit status
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ needs.redteam.result }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ needs.setup.outputs.sha }}',
              state: passed ? 'success' : 'failure',
              context: 'Red team / Prompt injection security',
              description: passed
                ? 'All prompt injection tests passed'
                : 'Prompt injection tests failed — see run logs',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
