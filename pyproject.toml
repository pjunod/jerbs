[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors (PEP 8)
    "W",   # pycodestyle warnings (PEP 8)
    "F",   # pyflakes (undefined names, unused imports)
    "I",   # isort (PEP 8 import ordering)
    "B",   # flake8-bugbear (common bugs)
    "UP",  # pyupgrade (modernise syntax for Python 3.11)
]
ignore = [
    "E221",  # multiple spaces before operator (allow alignment style)
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["gmail_client", "screener", "scheduler", "setup_wizard"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
