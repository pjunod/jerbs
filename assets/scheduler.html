<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans, system-ui, sans-serif); background: transparent; }
  .wrap { padding: 1.5rem 0; max-width: 680px; }
  .card { background: var(--color-background-primary, #fff); border: 0.5px solid var(--color-border-tertiary, #e5e7eb); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .row:last-child { margin-bottom: 0; }
  label { font-size: 13px; color: var(--color-text-secondary, #6b7280); min-width: 110px; }
  select { font-size: 13px; padding: 6px 10px; border-radius: 8px; border: 0.5px solid var(--color-border-secondary, #d1d5db); background: var(--color-background-secondary, #f9fafb); color: var(--color-text-primary, #111); }
  .to-label { font-size: 13px; color: var(--color-text-secondary, #6b7280); }
  .status-card { border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; border: 0.5px solid var(--color-border-tertiary, #e5e7eb); background: var(--color-background-secondary, #f9fafb); }
  .mode-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; padding: 3px 12px; border-radius: 999px; margin-bottom: 12px; }
  .mode-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .mode-stopped  { background: var(--color-background-secondary, #f3f4f6); color: var(--color-text-secondary, #6b7280); border: 0.5px solid var(--color-border-secondary, #d1d5db); }
  .mode-offhours { background: #fef9c3; color: #854d0e; border: 0.5px solid #fde047; }
  .mode-bizhours { background: #d1fae5; color: #065f46; border: 0.5px solid #6ee7b7; }
  .mode-rapid    { background: #dbeafe; color: #1d4ed8; border: 0.5px solid #93c5fd; }
  .dot-stopped  { background: var(--color-text-secondary, #9ca3af); }
  .dot-offhours { background: #854d0e; }
  .dot-bizhours { background: #065f46; }
  .dot-rapid    { background: #1d4ed8; }
  .countdown { font-size: 32px; font-weight: 500; color: var(--color-text-primary, #111); font-family: var(--font-mono, monospace); margin-bottom: 4px; }
  .countdown-label { font-size: 12px; color: var(--color-text-secondary, #6b7280); margin-bottom: 14px; }
  .stats-row { display: flex; gap: 10px; }
  .stat { background: var(--color-background-primary, #fff); border: 0.5px solid var(--color-border-tertiary, #e5e7eb); border-radius: 8px; padding: 8px 12px; flex: 1; }
  .stat-val { font-size: 18px; font-weight: 500; color: var(--color-text-primary, #111); }
  .stat-lbl { font-size: 11px; color: var(--color-text-secondary, #6b7280); margin-top: 2px; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  button { font-family: inherit; font-size: 13px; padding: 8px 16px; border-radius: 8px; border: 0.5px solid var(--color-border-secondary, #d1d5db); background: transparent; color: var(--color-text-primary, #111); cursor: pointer; }
  button:hover { background: var(--color-background-secondary, #f3f4f6); }
  button.primary { background: var(--color-text-primary, #111); color: var(--color-background-primary, #fff); border-color: var(--color-text-primary, #111); }
  button.primary:hover { opacity: 0.85; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  .log { background: var(--color-background-secondary, #f9fafb); border-radius: 8px; padding: 10px 12px; font-size: 12px; font-family: var(--font-mono, monospace); color: var(--color-text-secondary, #6b7280); max-height: 140px; overflow-y: auto; }
  .log-line { padding: 1px 0; }
  .log-fire  { color: #065f46; }
  .log-rapid { color: #1d4ed8; }
  .log-auto  { color: #854d0e; }
  .section-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary, #111); margin-bottom: 12px; }
  .rapid-bar-wrap { height: 4px; background: var(--color-border-tertiary, #e5e7eb); border-radius: 2px; margin-top: 8px; }
  .rapid-bar { height: 4px; background: #378ADD; border-radius: 2px; transition: width 1s linear; }
  .hint { font-size: 12px; color: var(--color-text-secondary, #6b7280); margin-top: 10px; line-height: 1.5; padding: 8px 10px; border-left: 2px solid var(--color-border-secondary, #d1d5db); }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="section-title">Business hours</div>
    <div class="row">
      <label>Timezone</label>
      <select id="tz">
        <option value="America/New_York">Eastern (ET)</option>
        <option value="America/Chicago">Central (CT)</option>
        <option value="America/Denver">Mountain (MT)</option>
        <option value="America/Los_Angeles">Pacific (PT)</option>
        <option value="Europe/London">London</option>
        <option value="Europe/Amsterdam">Amsterdam</option>
        <option value="UTC">UTC</option>
      </select>
    </div>
    <div class="row">
      <label>Hours</label>
      <select id="biz-start">
        <option value="6">6:00 AM</option><option value="7">7:00 AM</option>
        <option value="8">8:00 AM</option><option value="9" selected>9:00 AM</option>
        <option value="10">10:00 AM</option>
      </select>
      <span class="to-label">to</span>
      <select id="biz-end">
        <option value="15">3:00 PM</option><option value="16">4:00 PM</option>
        <option value="17" selected>5:00 PM</option><option value="18">6:00 PM</option>
        <option value="19">7:00 PM</option><option value="20">8:00 PM</option>
      </select>
    </div>
    <div class="hint">
      Business hours → every 15 min &nbsp;·&nbsp; Off-hours → every 60 min &nbsp;·&nbsp; Rapid (auto) → every 5 min for 30 min when draft replies are generated
    </div>
  </div>

  <div class="status-card">
    <div id="mode-badge" class="mode-badge mode-stopped">
      <div id="mode-dot" class="mode-dot dot-stopped"></div>
      <span id="mode-text">Stopped</span>
    </div>
    <div id="countdown" class="countdown">--:--</div>
    <div id="countdown-label" class="countdown-label">Start the scheduler to begin</div>
    <div class="stats-row">
      <div class="stat">
        <div id="stat-runs" class="stat-val">0</div>
        <div class="stat-lbl">Runs this session</div>
      </div>
      <div class="stat" id="stat-rapid-wrap" style="display:none;">
        <div id="stat-rapid" class="stat-val">--:--</div>
        <div class="stat-lbl">Rapid mode ends</div>
        <div class="rapid-bar-wrap"><div class="rapid-bar" id="rapid-bar" style="width:100%"></div></div>
      </div>
    </div>
    <div class="actions">
      <button class="primary" id="start-btn" onclick="startScheduler()">Start scheduler</button>
      <button id="stop-btn" onclick="stopScheduler()" disabled>Pause</button>
      <button id="run-now-btn" onclick="runNow()" disabled>Run now ↗</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Activity log</div>
    <div class="log" id="log"><div class="log-line">Scheduler not started.</div></div>
  </div>
</div>

<script>
  const RAPID_MS          = 5  * 60 * 1000;
  const BIZ_MS            = 15 * 60 * 1000;
  const OFFHRS_MS         = 60 * 60 * 1000;
  const RAPID_DURATION_MS = 30 * 60 * 1000;
  const TRIGGER_TOKEN     = 'JERBS:RAPID_START';

  let isRunning    = false;
  let tickInterval = null;
  let nextRunAt    = null;
  let rapidModeEnd = null;
  let runCount     = 0;
  let lastInterval = null;
  let observer     = null;
  let observedLen  = 0;

  function getLocalHour() {
    const tz = document.getElementById('tz').value;
    const parts = new Intl.DateTimeFormat('en-US', { timeZone: tz, hour: 'numeric', hour12: false }).formatToParts(new Date());
    const h = parts.find(p => p.type === 'hour');
    return parseInt(h ? h.value : new Date().getHours(), 10);
  }

  function isBusinessHours() {
    const hour  = getLocalHour();
    const start = parseInt(document.getElementById('biz-start').value, 10);
    const end   = parseInt(document.getElementById('biz-end').value, 10);
    return hour >= start && hour < end;
  }

  function currentInterval() {
    if (rapidModeEnd && Date.now() < rapidModeEnd) return RAPID_MS;
    return isBusinessHours() ? BIZ_MS : OFFHRS_MS;
  }

  function currentMode() {
    if (rapidModeEnd && Date.now() < rapidModeEnd) return 'rapid';
    return isBusinessHours() ? 'bizhours' : 'offhours';
  }

  function fmtMs(ms) {
    if (ms <= 0) return '00:00';
    const s = Math.round(ms / 1000);
    return String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }

  function addLog(msg, cls) {
    const el   = document.getElementById('log');
    const now  = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    const line = document.createElement('div');
    line.className = 'log-line' + (cls ? ' ' + cls : '');
    line.textContent = now + '  ' + msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  function triggerRapid(reason) {
    const already = rapidModeEnd && Date.now() < rapidModeEnd;
    rapidModeEnd = Date.now() + RAPID_DURATION_MS;
    nextRunAt    = Date.now() + RAPID_MS;
    lastInterval = RAPID_MS;
    addLog((already ? 'Rapid extended: ' : 'Auto rapid: ') + (reason || 'draft replies detected') + ' — 5 min for 30 min.', 'log-rapid');
    updateUI();
  }

  function updateModeDisplay() {
    const mode = currentMode();
    const labels = { rapid:'Rapid response — auto (5 min)', bizhours:'Business hours (15 min)', offhours:'Off-hours (60 min)', stopped:'Stopped' };
    document.getElementById('mode-badge').className = 'mode-badge mode-' + mode;
    document.getElementById('mode-dot').className   = 'mode-dot dot-' + mode;
    document.getElementById('mode-text').textContent = labels[mode];
  }

  function updateUI() {
    if (!isRunning) return;
    const now = Date.now();
    updateModeDisplay();
    document.getElementById('countdown').textContent = fmtMs(nextRunAt - now);
    document.getElementById('countdown-label').textContent = 'Next run at ' + fmtTime(nextRunAt);
    document.getElementById('stat-runs').textContent = runCount;

    const rw = document.getElementById('stat-rapid-wrap');
    if (rapidModeEnd && now < rapidModeEnd) {
      rw.style.display = 'block';
      document.getElementById('stat-rapid').textContent = fmtTime(rapidModeEnd);
      document.getElementById('rapid-bar').style.width = Math.round(Math.max(0, Math.min(100, (rapidModeEnd - now) / RAPID_DURATION_MS * 100))) + '%';
    } else {
      if (rapidModeEnd && now >= rapidModeEnd) {
        rapidModeEnd = null;
        rw.style.display = 'none';
        addLog('Rapid mode ended — back to ' + (isBusinessHours() ? '15-min' : '60-min') + '.', 'log-auto');
        scheduleNext(false);
      } else {
        rw.style.display = 'none';
      }
    }

    const newInterval = currentInterval();
    if (lastInterval !== null && lastInterval !== newInterval && !(rapidModeEnd && now < rapidModeEnd)) {
      lastInterval = newInterval;
      scheduleNext(false);
    }
  }

  function scheduleNext(sooner) {
    const candidate = Date.now() + currentInterval();
    if (!sooner || !nextRunAt || candidate < nextRunAt) {
      nextRunAt    = candidate;
      lastInterval = currentInterval();
    }
  }

  function buildPrompt() {
    return `Please run my jerbs screener — both passes, combined report.

PASS 1 query: (subject:(opportunity OR role OR position OR opening OR hiring) OR from:(linkedin.com OR jobalerts.indeed.com OR indeedemail.com)) newer_than:1d
PASS 2 query: newer_than:1d -from:linkedin.com -from:jobalerts.indeed.com -from:indeedemail.com -from:noreply -from:no-reply (subject:(opportunity OR role OR position OR opening OR hiring OR "reaching out" OR "your background" OR "your profile" OR "came across") OR ("your experience" OR "your background" OR "came across your profile" OR "reaching out" OR "great fit" OR "perfect fit"))

Load criteria from my criteria file and apply them. Run in read-only mode — do not send, delete, label, archive, or create drafts in Gmail.

IMPORTANT — AUTOMATIC RAPID MODE: At the very end of your response, if you generated any draft replies, include the exact token on its own line with nothing else after it:
JERBS:RAPID_START`;
  }

  function fireRun() {
    runCount++;
    addLog('Run #' + runCount + ' fired (' + currentMode() + ').', 'log-fire');
    scheduleNext(false);
    if (typeof sendPrompt === 'function') {
      sendPrompt(buildPrompt());
    }
  }

  function tick() {
    if (!isRunning) return;
    if (Date.now() >= nextRunAt) fireRun();
    updateUI();
  }

  function startObserver() {
    if (observer) observer.disconnect();
    observedLen = (document.body.innerText || '').length;
    observer = new MutationObserver(() => {
      const text = document.body.innerText || '';
      if (text.length > observedLen) {
        const newText = text.slice(observedLen);
        if (newText.includes(TRIGGER_TOKEN)) triggerRapid('draft replies in last run');
        observedLen = text.length;
      }
    });
    observer.observe(document.body, { childList: true, subtree: true, characterData: true });
  }

  function startScheduler() {
    if (isRunning) return;
    isRunning = true;
    rapidModeEnd = null;
    document.getElementById('log').innerHTML = '';
    addLog('Scheduler started.');
    scheduleNext(false);
    startObserver();
    tickInterval = setInterval(tick, 1000);
    document.getElementById('start-btn').disabled = true;
    document.getElementById('start-btn').textContent = 'Running';
    document.getElementById('stop-btn').disabled = false;
    document.getElementById('run-now-btn').disabled = false;
    updateModeDisplay();
    updateUI();
  }

  function stopScheduler() {
    isRunning = false;
    clearInterval(tickInterval);
    tickInterval = null;
    nextRunAt    = null;
    rapidModeEnd = null;
    if (observer) { observer.disconnect(); observer = null; }
    addLog('Scheduler paused.');
    document.getElementById('mode-badge').className  = 'mode-badge mode-stopped';
    document.getElementById('mode-dot').className    = 'mode-dot dot-stopped';
    document.getElementById('mode-text').textContent = 'Stopped';
    document.getElementById('countdown').textContent = '--:--';
    document.getElementById('countdown-label').textContent = 'Paused';
    document.getElementById('stat-rapid-wrap').style.display = 'none';
    document.getElementById('start-btn').disabled = false;
    document.getElementById('start-btn').textContent = 'Resume';
    document.getElementById('stop-btn').disabled = true;
    document.getElementById('run-now-btn').disabled = true;
  }

  function runNow() {
    if (!isRunning) return;
    addLog('Manual run triggered.');
    fireRun();
  }
</script>
</body>
</html>
